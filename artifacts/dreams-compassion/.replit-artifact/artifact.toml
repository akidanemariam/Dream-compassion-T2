kind = "web"
previewPath = "/"
title = "Dreams Compassion"
version = "1.0.0"
id = "artifacts/dreams-compassion"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23385

[services.development]
run = "pnpm --filter @workspace/dreams-compassion run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dreams-compassion", "run", "build" ]
publicDir = "artifacts/dreams-compassion/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23385"
BASE_PATH = "/"
